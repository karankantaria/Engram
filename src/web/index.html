<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>engram</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Capture bar: terminal prompt -->
  <div id="capturebar">
    <span class="prompt">engram&gt;</span>
    <textarea id="capture" rows="1" autocomplete="off" spellcheck="false"
      placeholder="dump a thought… (Enter to save · Shift+Enter for newline)"></textarea>
    <span id="backend" class="backend"></span>
  </div>

  <div id="main">
    <!-- Graph -->
    <div id="graphpane">
      <div id="graph"></div>
      <div id="legend"></div>
      <div id="filterbar" class="hidden"></div>
      <div id="statusline"></div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div id="toolbar">
        <input id="search" type="text" placeholder="/ search · Enter to ask Claude" autocomplete="off" spellcheck="false" />
        <button id="btn-ask" title="Ask Claude a question answered from your notes">⏎ ask</button>
        <button id="btn-librarian" title="Ask Claude to name clusters & suggest links">⟳ librarian</button>
        <button id="btn-import" title="Import files (md/txt/pdf) — auto-split into notes">⇪ import</button>
        <button id="btn-export" title="Export all notes to a zip">⤓ export</button>
      </div>

      <div id="answer" class="panel hidden"></div>
      <div id="clusterview" class="panel hidden"></div>
      <div id="searchresults" class="panel hidden"></div>

      <div id="reader" class="panel hidden">
        <div class="reader-head">
          <span id="reader-title"></span>
          <span class="reader-actions">
            <button id="btn-edit" title="Edit raw markdown">edit</button>
            <button id="btn-save" title="Save edits">save</button>
            <button id="btn-delete" title="Delete note">del</button>
            <button id="btn-close" title="Close">✕</button>
          </span>
        </div>
        <div id="reader-meta"></div>
        <div id="reader-rendered" class="md"></div>
        <textarea id="reader-body" class="hidden" spellcheck="false"></textarea>
      </div>

      <div id="review" class="panel"></div>
      <div id="todos" class="panel"></div>
      <div id="suggestions" class="panel"></div>
      <div id="clusters" class="panel"></div>
    </div>
  </div>

  <div id="toast"></div>

  <!-- Command palette (Ctrl+K) -->
  <div id="palette" class="overlay hidden">
    <div class="palette-box">
      <input id="palette-input" type="text" autocomplete="off" spellcheck="false"
        placeholder="jump to a note or run a command…" />
      <div id="palette-list"></div>
    </div>
  </div>

  <!-- Quiz overlay -->
  <div id="quiz" class="overlay hidden">
    <div class="quiz-box">
      <div id="quiz-head"></div>
      <div id="quiz-card"></div>
      <div id="quiz-actions"></div>
    </div>
  </div>

  <script src="vendor/force-graph.min.js"></script>
  <script src="vendor/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
